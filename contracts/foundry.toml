[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Foundry >=1.0 disables the solc optimizer by default; unoptimized, RWAVault's
# runtime bytecode is 24712 bytes — above the EIP-170 limit (24576), so the
# deployment reverts on any real chain. 200 runs biases toward deployment size.
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
